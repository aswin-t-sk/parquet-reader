<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquet Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- hyparquet is ESM-only; loaded via esm.sh which works on any static host -->
    <script type="module" id="mainScript">
    // Imported at top level so the IIFE below can use it via window.__parquetRead
    import { parquetRead } from 'https://esm.sh/hyparquet@1.5.0';
    window.__parquetRead = parquetRead;
    window.__hyparquetReady = true;
    document.dispatchEvent(new Event('hyparquet:ready'));
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f14;
            --surface: #13161e;
            --surface2: #1a1e28;
            --surface3: #222636;
            --border: #2a2f42;
            --border-bright: #3d4460;
            --text: #c8d0e8;
            --text-dim: #6b7394;
            --text-bright: #eef1fb;
            --accent: #4af0c4;
            --accent2: #7c8bff;
            --accent3: #ff6b9d;
            --accent-dim: rgba(74,240,196,0.1);
            --accent2-dim: rgba(124,139,255,0.1);
            --row-hover: rgba(74,240,196,0.04);
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
            --radius: 6px;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR ────────────────────────────────────── */
        #sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.5rem 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .logo-text {
            font-family: var(--mono);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-bright);
            letter-spacing: 0.02em;
        }

        .logo-sub {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-family: var(--mono);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-left: 36px;
        }

        /* ── DROPZONE ───────────────────────────────────── */
        #dropzone {
            margin: 1rem 1.25rem;
            border: 1.5px dashed var(--border-bright);
            border-radius: var(--radius);
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--surface2);
            position: relative;
        }

        #dropzone:hover, #dropzone.dragover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        #dropzone.dragover { transform: scale(1.01); }

        .dropzone-icon {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .dropzone-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .dropzone-label strong {
            color: var(--accent);
            font-weight: 500;
        }

        #fileInput { display: none; }

        /* ── FILE STATUS ────────────────────────────────── */
        #fileStatus {
            margin: 0 1.25rem 0.75rem;
            padding: 0.625rem 0.75rem;
            background: var(--surface2);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-size: 0.75rem;
            font-family: var(--mono);
            color: var(--text-dim);
            display: none;
            word-break: break-all;
        }

        #fileStatus.active {
            display: block;
            border-color: var(--accent);
            color: var(--accent);
        }

        #fileStatus.error {
            display: block;
            border-color: var(--accent3);
            color: var(--accent3);
        }

        /* ── SCHEMA PANEL ───────────────────────────────── */
        .schema-title {
            padding: 0.75rem 1.25rem 0.5rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            font-weight: 600;
            border-top: 1px solid var(--border);
        }

        #schemaList {
            flex: 1;
            overflow-y: auto;
            padding: 0.25rem 0.75rem 1rem;
        }

        #schemaList::-webkit-scrollbar { width: 4px; }
        #schemaList::-webkit-scrollbar-track { background: transparent; }
        #schemaList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .schema-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
            cursor: default;
            transition: background 0.15s;
            font-size: 0.8rem;
        }

        .schema-item:hover { background: var(--surface3); }

        .schema-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .schema-name {
            font-family: var(--mono);
            color: var(--text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .schema-type {
            font-family: var(--mono);
            font-size: 0.65rem;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .type-num { background: rgba(74,240,196,0.12); color: var(--accent); }
        .type-str { background: rgba(255,107,157,0.12); color: var(--accent3); }
        .type-bool { background: rgba(124,139,255,0.12); color: var(--accent2); }
        .type-date { background: rgba(255,180,74,0.12); color: #ffb44a; }
        .type-other { background: var(--surface3); color: var(--text-dim); }

        /* ── MAIN ───────────────────────────────────────── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOP BAR ────────────────────────────────────── */
        #topbar {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-shrink: 0;
            background: var(--surface);
        }

        #filename-display {
            font-family: var(--mono);
            font-size: 0.9rem;
            color: var(--text-bright);
            font-weight: 500;
        }

        #filename-display span {
            color: var(--text-dim);
            font-weight: 400;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* ── METRICS ────────────────────────────────────── */
        #metricsBar {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface);
        }

        .metric {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border-right: 1px solid var(--border);
            transition: background 0.15s;
        }

        .metric:last-child { border-right: none; }
        .metric:hover { background: var(--surface2); }

        .metric-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .metric-value {
            font-family: var(--mono);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-bright);
        }

        .metric-value .unit {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 400;
            margin-left: 0.25rem;
        }

        /* ── TOOLBAR ────────────────────────────────────── */
        #toolbar {
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            background: var(--surface);
        }

        #searchInput {
            flex: 1;
            max-width: 360px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.45rem 0.75rem 0.45rem 2rem;
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        #searchInput::placeholder { color: var(--text-dim); }
        #searchInput:focus { border-color: var(--accent); }

        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 360px;
        }

        .search-icon {
            position: absolute;
            left: 0.6rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .pill-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.45rem 0.875rem;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .pill-btn:hover { border-color: var(--accent2); color: var(--accent2); background: var(--accent2-dim); }

        #rowCount {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* ── TABLE ──────────────────────────────────────── */
        #tableWrap {
            flex: 1;
            overflow: auto;
            background: var(--bg);
        }

        #tableWrap::-webkit-scrollbar { width: 8px; height: 8px; }
        #tableWrap::-webkit-scrollbar-track { background: var(--surface); }
        #tableWrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        #tableWrap::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        thead tr {
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 0.6rem 1rem;
            text-align: left;
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: color 0.15s, background 0.15s;
        }

        th:hover { color: var(--text-bright); background: var(--surface2); }

        th .th-inner {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        th .sort-indicator {
            font-size: 0.6rem;
            opacity: 0.4;
        }

        th.sorted { color: var(--accent); }
        th.sorted .sort-indicator { opacity: 1; color: var(--accent); }

        th:first-child {
            width: 50px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.65rem;
            cursor: default;
        }

        th:first-child:hover { color: var(--text-dim); background: var(--surface); cursor: default; }

        td {
            padding: 0.55rem 1rem;
            border-bottom: 1px solid rgba(42,47,66,0.6);
            border-right: 1px solid rgba(42,47,66,0.3);
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--text);
            white-space: nowrap;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.1s;
        }

        td:first-child {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.7rem;
            background: var(--surface);
            width: 50px;
        }

        tbody tr:hover td { background: var(--row-hover); }
        tbody tr:hover td:first-child { background: var(--surface2); }

        .null-val { color: var(--text-dim); font-style: italic; }
        .num-val { color: var(--accent); }
        .bool-true { color: var(--accent); }
        .bool-false { color: var(--accent3); }

        /* ── PAGINATION ─────────────────────────────────── */
        #pagination {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface);
            font-size: 0.8rem;
        }

        .page-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.3rem 0.7rem;
            color: var(--text-dim);
            cursor: pointer;
            font-family: var(--mono);
            font-size: 0.75rem;
            transition: all 0.15s;
        }

        .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .page-btn:disabled { opacity: 0.35; cursor: default; }
        .page-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

        #pageInfo {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            margin: 0 0.5rem;
        }

        .page-size-select {
            margin-left: auto;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.3rem 0.5rem;
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 0.75rem;
            cursor: pointer;
            outline: none;
        }

        /* ── EMPTY STATE ────────────────────────────────── */
        #emptyState {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 1rem;
            color: var(--text-dim);
            padding: 3rem;
        }

        .empty-icon {
            font-size: 3rem;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 1.1rem;
            color: var(--text);
            font-weight: 500;
        }

        .empty-sub {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
            max-width: 320px;
            line-height: 1.6;
            font-family: var(--mono);
        }

        /* ── LOADING ────────────────────────────────────── */
        #loadingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13,15,20,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }

        #loadingOverlay.show { display: flex; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* ── HIDDEN ─────────────────────────────────────── */
        .hidden { display: none !important; }

        /* ── PRIVACY BADGE ──────────────────────────────── */
        .privacy-badge {
            margin: 0 1.25rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        .privacy-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── ANIMATIONS ─────────────────────────────────── */
        #dashboard {
            display: contents;
        }

        tbody tr {
            animation: fadeRow 0.15s ease forwards;
        }

        @keyframes fadeRow {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Parsing parquet file…</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-icon">⬡</div>
            <span class="logo-text">pq.explorer</span>
        </div>
        <div class="logo-sub"> User End Secure Parquet Explorer</div>
    </div>

    <label id="dropzone">
        <span class="dropzone-icon">📁</span>
        <div class="dropzone-label">
            <strong>Click to upload</strong> or drag & drop<br>
            <span style="font-size:0.7rem;">.parquet files · processed locally</span>
        </div>
        <input type="file" id="fileInput" accept=".parquet,.parquet.snappy,.parquet.gz">
    </label>

    <div id="fileStatus"></div>

    <div class="privacy-badge">
        <div class="privacy-dot"></div>
        100% client-side · no uploads
    </div>

    <div class="schema-title" id="schemaTitle" style="display:none">Schema</div>
    <div id="schemaList"></div>
</div>

<!-- MAIN -->
<div id="main">
    <!-- Empty State -->
    <div id="emptyState">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">No file loaded</div>
        <div class="empty-sub">Upload a .parquet file from the sidebar to explore your data right here in the browser.</div>
    </div>

    <!-- Dashboard (hidden until file loaded) -->
    <div id="dashboard" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div id="topbar">
            <div id="filename-display">—</div>
        </div>

        <div id="metricsBar">
            <div class="metric">
                <div class="metric-label">Rows</div>
                <div class="metric-value" id="valRows">—</div>
            </div>
            <div class="metric">
                <div class="metric-label">Columns</div>
                <div class="metric-value" id="valCols">—</div>
            </div>
            <div class="metric">
                <div class="metric-label">File Size</div>
                <div class="metric-value" id="valSize">—</div>
            </div>
            <div class="metric">
                <div class="metric-label">Showing</div>
                <div class="metric-value" id="valShowing">—</div>
            </div>
        </div>

        <div id="toolbar">
            <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input type="text" id="searchInput" placeholder="Filter rows…">
            </div>
            <button class="pill-btn" id="clearSort">↺ Reset sort</button>
            <div id="rowCount" style="margin-left:auto; font-family:var(--mono); font-size:0.75rem; color:var(--text-dim);"></div>
        </div>

        <div id="tableWrap">
            <table>
                <thead id="tHead"></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>

        <div id="pagination"></div>
    </div>
</div>

<script>
(function() {
    const PAGE_SIZES = [25, 50, 100, 250];

    let allRows = [];
    let filteredRows = [];
    let headers = [];
    let colTypes = [];
    let sortCol = null;
    let sortDir = 1;
    let currentPage = 0;
    let pageSize = 50;
    let searchTerm = '';

    // ── Elements ────────────────────────────────────────
    const fileInput   = document.getElementById('fileInput');
    const dropzone    = document.getElementById('dropzone');
    const fileStatus  = document.getElementById('fileStatus');
    const schemaList  = document.getElementById('schemaList');
    const schemaTitle = document.getElementById('schemaTitle');
    const emptyState  = document.getElementById('emptyState');
    const dashboard   = document.getElementById('dashboard');
    const loadingOverlay = document.getElementById('loadingOverlay');

    // ── Drag and drop ───────────────────────────────────
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) processFile(file);
    });

    fileInput.addEventListener('change', e => {
        if (e.target.files[0]) processFile(e.target.files[0]);
    });

    // ── File Processing ─────────────────────────────────
    async function processFile(file) {
        loadingOverlay.classList.add('show');
        setStatus('loading', `Loading: ${file.name}`);

        try {
            const arrayBuffer = await file.arrayBuffer();
            await parseParquet(arrayBuffer, file);
        } catch(err) {
            console.error(err);
            setStatus('error', `Error: ${err.message}`);
            loadingOverlay.classList.remove('show');
        }
    }

    async function parseParquet(arrayBuffer, file) {
        // Wait for the ES module to finish loading if it hasn't yet
        if (!window.__hyparquetReady) {
            await new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject(new Error(
                    'hyparquet failed to load. Make sure esm.sh is reachable (requires internet on first load to fetch the library; after that it is cached).'
                )), 15000);
                document.addEventListener('hyparquet:ready', () => { clearTimeout(timeout); resolve(); }, { once: true });
            });
        }

        const parquetRead = window.__parquetRead;

        // Wrap the ArrayBuffer as an AsyncBuffer (hyparquet 1.x API)
        const asyncBuf = {
            byteLength: arrayBuffer.byteLength,
            slice: (start, end) => Promise.resolve(arrayBuffer.slice(start, end))
        };

        return new Promise((resolve, reject) => {
            parquetRead({
                file: asyncBuf,
                rowFormat: 'object', 
                onComplete: (data) => {
                    try { renderAll(data, file); resolve(); }
                    catch(e) { reject(e); }
                }
            }).catch(reject);
        });
    }

    // ── Render ──────────────────────────────────────────
    function renderAll(rows, file) {
        if (!rows || rows.length === 0) {
            setStatus('error', 'File is empty or unreadable.');
            loadingOverlay.classList.remove('show');
            return;
        }

        allRows = rows;
        headers = Object.keys(rows[0]);
        colTypes = detectTypes(rows, headers);
        sortCol = null; sortDir = 1;
        searchTerm = ''; currentPage = 0;
        document.getElementById('searchInput').value = '';

        // File info
        setStatus('active', file.name);
        document.getElementById('filename-display').textContent = file.name;

        // Metrics
        const sizeFmt = formatSize(file.size);
        document.getElementById('valRows').innerHTML = rows.length.toLocaleString();
        document.getElementById('valCols').innerHTML = headers.length;
        document.getElementById('valSize').innerHTML = `${sizeFmt.val}<span class="unit">${sizeFmt.unit}</span>`;

        // Schema
        renderSchema();

        // Table + pagination
        applyFiltersAndSort();

        // Show dashboard
        emptyState.style.display = 'none';
        dashboard.style.display = 'flex';
        dashboard.style.flexDirection = 'column';
        dashboard.style.flex = '1';
        dashboard.style.overflow = 'hidden';

        loadingOverlay.classList.remove('show');
    }

    function detectTypes(rows, headers) {
        return headers.map(h => {
            for (let i = 0; i < Math.min(50, rows.length); i++) {
                const v = rows[i][h];
                if (v === null || v === undefined) continue;
                if (typeof v === 'boolean') return 'bool';
                if (typeof v === 'number' || typeof v === 'bigint') return 'num';
                if (v instanceof Date) return 'date';
                if (typeof v === 'string') return 'str';
                return 'other';
            }
            return 'other';
        });
    }

    function renderSchema() {
        schemaTitle.style.display = 'block';
        const TYPE_COLOR = { num: 'type-num', str: 'type-str', bool: 'type-bool', date: 'type-date', other: 'type-other' };
        const TYPE_DOT = { num: 'var(--accent)', str: 'var(--accent3)', bool: 'var(--accent2)', date: '#ffb44a', other: 'var(--text-dim)' };
        const TYPE_LABEL = { num: 'NUM', str: 'STR', bool: 'BOOL', date: 'DATE', other: '???' };

        schemaList.innerHTML = headers.map((h, i) => {
            const t = colTypes[i];
            return `
                <div class="schema-item">
                    <div class="schema-dot" style="background:${TYPE_DOT[t]}"></div>
                    <div class="schema-name" title="${h}">${h}</div>
                    <div class="schema-type ${TYPE_COLOR[t]}">${TYPE_LABEL[t]}</div>
                </div>`;
        }).join('');
    }

    function applyFiltersAndSort() {
        let rows = allRows;

        // Search filter
        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            rows = rows.filter(row =>
                headers.some(h => {
                    const v = row[h];
                    if (v === null || v === undefined) return false;
                    return String(v).toLowerCase().includes(term);
                })
            );
        }

        // Sort
        if (sortCol !== null) {
            rows = [...rows].sort((a, b) => {
                let va = a[headers[sortCol]], vb = b[headers[sortCol]];
                if (va === null || va === undefined) return 1;
                if (vb === null || vb === undefined) return -1;
                if (typeof va === 'bigint') va = Number(va);
                if (typeof vb === 'bigint') vb = Number(vb);
                if (va < vb) return -1 * sortDir;
                if (va > vb) return 1 * sortDir;
                return 0;
            });
        }

        filteredRows = rows;
        currentPage = 0;
        renderTable();
        renderPagination();

        const showing = Math.min(pageSize, filteredRows.length);
        document.getElementById('valShowing').innerHTML = `${showing.toLocaleString()}<span class="unit"> / pg</span>`;
        document.getElementById('rowCount').textContent =
            filteredRows.length !== allRows.length
                ? `${filteredRows.length.toLocaleString()} of ${allRows.length.toLocaleString()} rows`
                : `${allRows.length.toLocaleString()} rows`;
    }

    function renderTable() {
        const start = currentPage * pageSize;
        const slice = filteredRows.slice(start, start + pageSize);

        // Header
        document.getElementById('tHead').innerHTML = `<tr>
            <th>#</th>
            ${headers.map((h, i) => `
                <th class="${sortCol === i ? 'sorted' : ''}" data-col="${i}">
                    <div class="th-inner">
                        ${h}
                        <span class="sort-indicator">${sortCol === i ? (sortDir === 1 ? '↑' : '↓') : '↕'}</span>
                    </div>
                </th>`).join('')}
        </tr>`;

        // Bind sort
        document.querySelectorAll('#tHead th[data-col]').forEach(th => {
            th.addEventListener('click', () => {
                const col = parseInt(th.dataset.col);
                if (sortCol === col) sortDir *= -1;
                else { sortCol = col; sortDir = 1; }
                applyFiltersAndSort();
            });
        });

        // Body
        document.getElementById('tBody').innerHTML = slice.map((row, idx) => {
            const rowNum = start + idx + 1;
            return `<tr>
                <td>${rowNum}</td>
                ${headers.map((h, ci) => {
                    let v = row[h];
                    let cls = '', display = '';
                    if (v === null || v === undefined) {
                        cls = 'null-val'; display = 'null';
                    } else if (typeof v === 'boolean') {
                        cls = v ? 'bool-true' : 'bool-false'; display = String(v);
                    } else if (typeof v === 'bigint') {
                        cls = 'num-val'; display = v.toLocaleString();
                    } else if (typeof v === 'number') {
                        cls = 'num-val';
                        display = Number.isInteger(v) ? v.toLocaleString() : v.toPrecision(6);
                    } else if (v instanceof Date) {
                        display = v.toISOString().replace('T', ' ').slice(0, 19);
                    } else if (typeof v === 'object') {
                        display = JSON.stringify(v);
                    } else {
                        display = String(v);
                    }
                    return `<td class="${cls}" title="${display.replace(/"/g, '&quot;')}">${display}</td>`;
                }).join('')}
            </tr>`;
        }).join('');
    }

    function renderPagination() {
        const totalPages = Math.max(1, Math.ceil(filteredRows.length / pageSize));
        const pg = document.getElementById('pagination');

        let btns = '';
        const maxVisible = 7;
        const half = Math.floor(maxVisible / 2);
        let startP = Math.max(0, currentPage - half);
        let endP = Math.min(totalPages - 1, startP + maxVisible - 1);
        if (endP - startP < maxVisible - 1) startP = Math.max(0, endP - maxVisible + 1);

        for (let i = startP; i <= endP; i++) {
            btns += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i + 1}</button>`;
        }

        pg.innerHTML = `
            <button class="page-btn" id="pgFirst" ${currentPage === 0 ? 'disabled' : ''}>«</button>
            <button class="page-btn" id="pgPrev"  ${currentPage === 0 ? 'disabled' : ''}>‹</button>
            ${btns}
            <button class="page-btn" id="pgNext" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>›</button>
            <button class="page-btn" id="pgLast" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>»</button>
            <span id="pageInfo">${currentPage + 1} / ${totalPages}</span>
            <select class="page-size-select" id="pageSizeSelect">
                ${PAGE_SIZES.map(s => `<option value="${s}" ${s === pageSize ? 'selected' : ''}>${s} rows</option>`).join('')}
            </select>`;

        pg.querySelectorAll('.page-btn[data-page]').forEach(btn => {
            btn.addEventListener('click', () => { currentPage = parseInt(btn.dataset.page); renderTable(); renderPagination(); });
        });

        const go = (p) => { currentPage = Math.max(0, Math.min(totalPages - 1, p)); renderTable(); renderPagination(); };
        document.getElementById('pgFirst').addEventListener('click', () => go(0));
        document.getElementById('pgPrev').addEventListener('click',  () => go(currentPage - 1));
        document.getElementById('pgNext').addEventListener('click',  () => go(currentPage + 1));
        document.getElementById('pgLast').addEventListener('click',  () => go(totalPages - 1));

        document.getElementById('pageSizeSelect').addEventListener('change', e => {
            pageSize = parseInt(e.target.value);
            currentPage = 0;
            renderTable();
            renderPagination();
        });
    }

    // ── Search & Sort reset ──────────────────────────────
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', e => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            searchTerm = e.target.value.trim();
            applyFiltersAndSort();
        }, 200);
    });

    document.getElementById('clearSort').addEventListener('click', () => {
        sortCol = null; sortDir = 1;
        applyFiltersAndSort();
    });

    // ── Helpers ──────────────────────────────────────────
    function setStatus(type, msg) {
        fileStatus.className = type;
        fileStatus.textContent = msg;
        fileStatus.style.display = 'block';
    }

    function formatSize(bytes) {
        if (bytes >= 1024 * 1024 * 1024) return { val: (bytes / (1024**3)).toFixed(2), unit: ' GB' };
        if (bytes >= 1024 * 1024)        return { val: (bytes / (1024**2)).toFixed(2), unit: ' MB' };
        return { val: (bytes / 1024).toFixed(1), unit: ' KB' };
    }
})();
</script>
</body>
</html>
