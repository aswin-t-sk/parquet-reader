<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Parquet Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/hyparquet@0.3.1/dist/hyparquet.min.js"></script>
    <style>
        :root { --primary: #ff4b4b; --bg: #ffffff; --secondary-bg: #f0f2f6; --text: #31333f; }
        body { font-family: 'Source Sans Pro', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh;}
        
        /* Streamlit Sidebar */
        #sidebar { width: 320px; background: var(--secondary-bg); padding: 2rem 1.5rem; box-sizing: border-box; flex-shrink: 0; border-right: 1px solid #e6e9ef;}
        #sidebar h2 { margin-top: 0; font-size: 1.5rem; font-weight: 600;}
        .st-uploader { border: 1px dashed #cccccc; border-radius: 0.5rem; padding: 1.5rem; text-align: center; background: white; margin-top: 1rem; cursor: pointer;}
        .st-uploader:hover { border-color: var(--primary); }
        input[type="file"] { display: none; }
        
        /* Main Content */
        #main { flex-grow: 1; padding: 3rem 4rem; overflow-y: auto; box-sizing: border-box; }
        h1 { margin-top: 0; font-size: 2.25rem; font-weight: 600; padding-bottom: 1rem; border-bottom: 1px solid #e6e9ef;}
        
        /* Streamlit Metrics */
        .metrics-row { display: flex; gap: 1rem; margin-bottom: 2rem; margin-top: 2rem;}
        .metric-card { background: white; padding: 1rem 1.5rem; border-radius: 0.5rem; border: 1px solid #e6e9ef; box-shadow: 0 1px 2px rgba(0,0,0,0.05); flex: 1; }
        .metric-label { font-size: 0.875rem; color: #555; margin-bottom: 0.25rem; }
        .metric-value { font-size: 1.75rem; font-weight: 600; }
        
        /* Streamlit Dataframe */
        .dataframe-container { background: white; border-radius: 0.5rem; border: 1px solid #e6e9ef; overflow: auto; max-height: 600px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th { background: #f8f9fb; padding: 0.75rem 1rem; text-align: left; font-weight: 600; color: #555; border-bottom: 1px solid #e6e9ef; position: sticky; top: 0; z-index: 1;}
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #f0f2f6; white-space: nowrap; }
        tr:hover { background: #f8f9fb; }
        
        .badge { display: inline-block; padding: 0.25rem 0.5rem; background: #d3f9d8; color: #2b8a3e; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600; margin-bottom: 1rem;}
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Parquet Viewer</h2>
        <p style="font-size: 0.875rem; color: #555;">Upload a file to begin.</p>
        
        <label class="st-uploader">
            <span style="color: var(--primary); font-weight: 600;">Browse files</span>
            <span style="display: block; font-size: 0.8rem; color: #888; margin-top: 0.5rem;">.parquet files only</span>
            <input type="file" id="fileInput" accept=".parquet">
        </label>
        
        <div id="fileStatus" style="margin-top: 1rem; font-size: 0.875rem; color: #555;"></div>
    </div>

    <div id="main">
        <h1>📂 Data Explorer</h1>
        <div class="badge">✓ 100% Client-Side Processing</div>
        <p style="color: #555;">This tool runs entirely in your browser. No data is sent to GitHub or any server.</p>

        <div id="dashboard" style="display: none;">
            <div class="metrics-row">
                <div class="metric-card">
                    <div class="metric-label">Total Rows</div>
                    <div class="metric-value" id="valRows">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Total Columns</div>
                    <div class="metric-value" id="valCols">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">File Size</div>
                    <div class="metric-value" id="valSize">0 MB</div>
                </div>
            </div>

            <h3 style="margin-top: 2rem; font-weight: 600;">Data Preview</h3>
            <div class="dataframe-container">
                <table id="dataTable">
                    <thead id="tHead"></thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dashboard = document.getElementById('dashboard');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('fileStatus').innerText = `Loading: ${file.name}...`;

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const arrayBuffer = event.target.result;
                    
                    // Parse Parquet using pure Javascript
                    hyparquet.parquetRead({
                        file: arrayBuffer,
                        onComplete: (data) => {
                            renderDashboard(data, file.size);
                            document.getElementById('fileStatus').innerText = `Active: ${file.name}`;
                        }
                    });
                } catch (err) {
                    console.error(err);
                    alert("Failed to parse Parquet file. Ensure it is not corrupted.");
                    document.getElementById('fileStatus').innerText = "Error reading file.";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function renderDashboard(rows, sizeBytes) {
            if (!rows || rows.length === 0) {
                alert("File is empty.");
                return;
            }

            dashboard.style.display = 'block';
            const headers = Object.keys(rows[0]);

            // Update Metrics
            document.getElementById('valRows').innerText = rows.length.toLocaleString();
            document.getElementById('valCols').innerText = headers.length;
            document.getElementById('valSize').innerText = (sizeBytes / (1024 * 1024)).toFixed(2) + " MB";

            // Render Table Header
            document.getElementById('tHead').innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;

            // Render Table Body (Slice first 200 rows to prevent browser freeze on massive files)
            document.getElementById('tBody').innerHTML = rows.slice(0, 200).map(row => {
                return `<tr>${headers.map(h => {
                    let val = row[h];
                    if (val === null || val === undefined) val = "NaN";
                    // Handle nested objects/arrays
                    if (typeof val === 'object') val = JSON.stringify(val);
                    return `<td>${val}</td>`;
                }).join('')}</tr>`;
            }).join('');
        }
    </script>
</body>
</html>
